apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortress-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: fortress
  template:
    metadata:
      labels:
        app: fortress
    spec:
      containers:
      - name: fortress-container
        image: fortress-project:1.0
        ports:
        - containerPort: 5000
